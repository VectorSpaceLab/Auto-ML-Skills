# Paper2Skills Distiller run config.
# Copy this file, fill one or more [[runs]], then give the config path to DisCo, Codex, or Claude Code.

schema_version = 1

[defaults]
workspace_root = "/share/project/yuyang/workspace/Paper2Skills"

# Use "none" if there is no implementation repo, or "unknown" if you want the
# agent to follow repo_discovery_mode.
original_repo_source = "unknown"

# Source acquisition policy for URLs, arXiv ids, paper titles, Git repos, and
# optional repo discovery.
source_acquisition = "If paper_source or original_repo_source are not local paths, resolve and download/clone them first with bounded network commands. If a paper title or repo discovery search is ambiguous, ask me to choose from candidates before proceeding."
# ask: when original_repo_source="unknown", stop and ask whether to search or
#      proceed paper-only.
# auto: when original_repo_source="unknown", run bounded GitHub repo discovery
#       and clone the top candidate; candidates and blockers are logged.
# disabled: never search for an implementation repo automatically.
repo_discovery_mode = "ask"
network_timeout_seconds = 120
command_timeout_seconds = 20
allow_title_top_hit = false

# Recovery policy.
recovery_target = "Choose the fastest faithful target and ask me before expensive recovery."
ask_before_expensive_recovery = true
# hard: do not accept reduced/proxy/fallback recovery as success; record a blocker
#       or refine if the full requested standard cannot run.
# soft: a validated reduced/proxy recovery may be accepted when full runtime is
#       unavailable, but it still must run executable evidence and pass the
#       recovery experiment gate.
recovery_mode = "hard"

# Runtime policy.
runtime_constraints = "Do not mutate shared conda envs; use isolated env only. Create/reuse private recovery envs under $DISCO_CODING_AGENT_DIR/envs/ or ~/.disco/agent/envs/. Missing packages, model caches, datasets, or credentials are setup work to attempt before marking blocked. Reduced recovery is allowed if full model stack is unavailable."

# Maximum number of refine cycles after the first recovery. Users may override
# this per run.
iteration_budget = 10

language_preference = "Chinese summary"

# Leave blank to use defaults:
#   run_root=<workspace_root>/<paper_slug>
#   distillation_root=<run_root>/distillation
#   skills_root=<run_root>/skills
#   generated_skills_root=<run_root>/skills
#   distiller_skills_root=inferred from the installed paper-skills-distiller script
#   attempt_dir=<run_root>/distillation
# The default layout intentionally avoids numbered attempt directories.
test_root = ""
skills_root = ""
generated_skills_root = ""
distiller_skills_root = ""
attempt_dir = ""

[[runs]]
paper_slug = "my_paper_slug"

# Accepted forms: local PDF/text path, direct PDF URL, arXiv abs/pdf URL,
# arXiv id, or paper title.
paper_source = "/path/to/paper.pdf"

# Accepted forms: local repo path, Git/GitHub URL, "none", or "unknown".
original_repo_source = "unknown"

# Optional per-paper overrides. Leave blank to inherit defaults above.
source_acquisition = ""
repo_discovery_mode = ""
recovery_target = ""
recovery_mode = ""
runtime_constraints = ""
language_preference = ""
notes = ""

# Optional numeric/boolean per-paper overrides. Uncomment only when needed.
# iteration_budget = 10
# network_timeout_seconds = 120
# command_timeout_seconds = 20
# allow_title_top_hit = false
# ask_before_expensive_recovery = true

# Add more papers by repeating [[runs]].
#
# [[runs]]
# paper_slug = "second_paper_slug"
# paper_source = "https://arxiv.org/abs/0000.00000"
# original_repo_source = "none"
