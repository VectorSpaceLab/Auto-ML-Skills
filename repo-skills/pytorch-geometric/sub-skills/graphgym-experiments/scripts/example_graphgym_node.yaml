# Safe GraphGym-style node-classification template for static validation.
# It is CPU-oriented and intentionally not launched by bundled scripts.
accelerator: cpu
devices: 1
out_dir: results
num_workers: 0
print: both
dataset:
  format: PyG
  name: Cora
  task: node
  task_type: classification
  node_encoder: false
  node_encoder_name: Atom
  edge_encoder: false
  edge_encoder_name: Bond
  split: [0.8, 0.1, 0.1]
train:
  batch_size: 128
  eval_period: 1
  ckpt_period: 100
  sampler: full_batch
  enable_ckpt: false
model:
  type: gnn
  loss_fun: cross_entropy
  edge_decoding: dot
  graph_pooling: add
gnn:
  layers_pre_mp: 0
  layers_mp: 2
  layers_post_mp: 1
  dim_inner: 16
  layer_type: gcnconv
  stage_type: stack
  batchnorm: false
  act: prelu
  dropout: 0.1
  agg: mean
  normalize_adj: false
optim:
  optimizer: adam
  base_lr: 0.01
  max_epoch: 5
