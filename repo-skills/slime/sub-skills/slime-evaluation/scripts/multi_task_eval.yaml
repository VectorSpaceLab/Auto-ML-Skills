eval:
  defaults:
    n_samples_per_eval_prompt: 1
    temperature: 0.7
    top_p: 1.0
    max_response_len: 2048
  datasets:
    - name: aime
      path: /data/aime.jsonl
      rm_type: math
      input_key: prompt
      label_key: label
    - name: ifbench
      path: /data/ifbench.jsonl
      rm_type: ifbench
      input_key: prompt
      label_key: label
